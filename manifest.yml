app:
  id: ari:cloud:ecosystem::app/da88cb16-0f1f-4739-b70a-aa7bfd61afc8
  runtime:
    architecture: arm64
    memoryMB: 256
    name: nodejs24.x
modules:
  rovo:agent:
    - key: forge-rovo-action-request-echo
      name: Request Echoer
      description: A utility to echo a request to Rovo and expose the current Rovo context object
      actions:
        - echo-request
      conversationStarters:
        - Echo the current request
      prompt: resource:agent-prompts;agent-instructions.md
  action:
    - key: echo-request
      name: Echo request
      description: Echos the current Rovo request into the Chat.
      actionVerb: GET
      function: echoRequest
      inputs:
        message:
          title: Message
          description: Any string that should be attached to the reqeust as echo text.
          required: false
          type: string
  trigger:
    - key: trigger-lifecycle
      events:
        - avi:forge:installed:app
        - avi:forge:upgraded:app
      function: lifecycle-handler
  webtrigger:
    - key: dev-trigger
      function: trigger
      response:
        type: dynamic
  function:
    - key: echoRequest
      handler: index.echoRequest
    - key: trigger
      handler: index.trigger
    - key: lifecycle-handler
      handler: index.lifecycle
resources:
  - key: agent-prompts
    path: prompts
